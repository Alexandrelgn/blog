<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photographies — Alexandre Ligneul</title>
  <link rel="icon" href="assets/site/favicon.ico"/>
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --bg: #ffffff;
      --soft: #f5f4f2;
      --border: #e8e6e2;
      --muted: #888582;
      --accent: #2d5a8e;
      --accent-light: #e8f0f9;
      --serif: 'Lora', Georgia, serif;
      --sans: 'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--serif); font-size: 1rem;
      text-decoration: none; color: var(--ink);
      letter-spacing: 0.01em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.1em; text-decoration: none;
      color: var(--muted); transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ── HERO ── */
    #hero {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      min-height: 88vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 5rem 2.5rem 4rem;
      align-items: center;
    }
    .hero-content {}
    .hero-tag {
      display: inline-block;
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--accent);
      background: var(--accent-light);
      padding: 0.3rem 0.85rem; border-radius: 2px;
      margin-bottom: 1.75rem;
      opacity: 0; animation: slideIn 0.6s 0.1s forwards;
    }
    .hero-name {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 600; line-height: 1.08;
      margin-bottom: 0.5rem;
      opacity: 0; animation: slideIn 0.6s 0.25s forwards;
    }
    .hero-role {
      font-family: var(--serif); font-style: italic;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      color: var(--muted); margin-bottom: 2rem;
      opacity: 0; animation: slideIn 0.6s 0.4s forwards;
    }
    .hero-bio {
      font-size: 0.97rem; line-height: 1.75;
      color: #444; max-width: 520px;
      margin-bottom: 2.5rem;
      opacity: 0; animation: slideIn 0.6s 0.55s forwards;
    }
    .hero-actions {
      display: flex; gap: 1rem; flex-wrap: wrap;
      opacity: 0; animation: slideIn 0.6s 0.7s forwards;
    }
    .btn-primary {
      display: inline-block; padding: 0.7rem 1.6rem;
      background: var(--accent); color: white;
      text-decoration: none; font-size: 0.82rem;
      font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-primary:hover { background: #1d4a7e; transform: translateY(-1px); }
    .btn-secondary {
      display: inline-block; padding: 0.7rem 1.6rem;
      border: 1px solid var(--border); color: var(--ink);
      text-decoration: none; font-size: 0.82rem;
      font-weight: 400; letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .hero-photo-wrap {
      display: flex; justify-content: flex-end;
      opacity: 0; animation: fadeIn 0.8s 0.5s forwards;
    }
    .hero-photo {
      width: 280px; height: 350px;
      object-fit: cover; object-position: top;
      filter: grayscale(8%);
    }
    .hero-photo-frame {
      position: relative;
    }
    .hero-photo-frame::before {
      content: '';
      position: absolute; top: -8px; left: -8px; right: 8px; bottom: 8px;
      border: 1px solid var(--border); z-index: -1;
    }

    /* ── SECTION LAYOUT ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2.5rem; }
    .section-wrap { padding: 5rem 0; border-top: 1px solid var(--border); }
    .section-wrap.alt { background: var(--soft); }

    .section-label {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 3rem;
    }
    .section-label-num {
      font-family: var(--serif); font-style: italic;
      font-size: 0.8rem; color: var(--accent);
    }
    .section-label-title {
      font-family: var(--serif);
      font-size: 1.65rem; font-weight: 400;
    }
    .section-label-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .section-label-link {
      font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .section-label-link:hover { color: var(--accent); }

    /* ── PHOTOS ── */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .photo-card {
      position: relative; overflow: hidden;
      cursor: pointer; background: var(--soft);
    }
    .photo-card img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
      transition: transform 0.5s, filter 0.4s;
      filter: grayscale(10%);
    }
    .photo-card:hover img { transform: scale(1.04); filter: grayscale(0%); }
    .photo-card-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.5rem 1rem 0.75rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.65));
      color: white; font-size: 0.75rem;
      transform: translateY(4px); opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      letter-spacing: 0.04em;
    }
    .photo-card:hover .photo-card-caption { opacity: 1; transform: none; }
    /* featured first photo */
    .photo-card.featured {
      grid-column: span 2; grid-row: span 2;
    }
    .photo-card.featured img { aspect-ratio: auto; height: 100%; }
    /* ── PAGE HEADER ── */
    .page-header { padding: 4rem 0 2.5rem; }
    .breadcrumb { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 1.25rem; }
    .breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb span { margin: 0 0.5rem; }
    .page-title { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); font-weight: 600; margin-bottom: 0.5rem; }
    .page-subtitle { font-family: var(--serif); font-style: italic; color: var(--muted); font-size: 1.1rem; margin-bottom: 0; }

    /* ── FILTERS ── */
    .filters {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      border: 1px solid var(--border);
      background: none; cursor: pointer;
      font-family: var(--sans); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent); background: var(--accent-light);
    }

    /* ── MASONRY GRID ── */
    .masonry {
      columns: 3; gap: 12px;
    }
    .masonry-item {
      break-inside: avoid; margin-bottom: 12px;
      position: relative; overflow: hidden; cursor: pointer;
    }
    .masonry-item img {
      width: 100%; display: block;
      transition: transform 0.5s, filter 0.4s;
      filter: grayscale(8%);
    }
    .masonry-item:hover img { transform: scale(1.03); filter: grayscale(0%); }
    .masonry-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 2rem 1rem 0.85rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      opacity: 0; transition: opacity 0.3s;
    }
    .masonry-item:hover .masonry-caption { opacity: 1; }
    .masonry-caption-title {
      color: white; font-size: 0.82rem; display: block;
      margin-bottom: 0.2rem;
    }
    .masonry-caption-meta {
      color: rgba(255,255,255,0.6); font-size: 0.68rem;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.93);
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      position: relative; max-width: 90vw;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .lightbox-img {
      max-width: 80vw; max-height: 65vh;
      object-fit: contain;
    }
    .lightbox-close {
      position: fixed; top: 1.5rem; right: 2rem;
      color: rgba(255,255,255,0.6); font-size: 1.5rem;
      cursor: pointer; background: none; border: none;
      transition: color 0.2s; line-height: 1;
    }
    .lightbox-close:hover { color: white; }
    .lightbox-nav {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); width: 2.5rem; height: 2.5rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
      transition: all 0.2s;
    }
    .lightbox-nav:hover { border-color: white; color: white; }
    .lightbox-info {
      margin-top: 1.25rem;
      text-align: center;
      padding: 0 1rem;
    }

    /*  */


    .lightbox-info-title {
      color: white;
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    .lightbox-info-meta {
      color: rgba(255,255,255,0.8);
      font-family: var(--sans);
      font-size: 0.68rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-top: 0.4rem;
    }
    .lightbox-info-alt {
      color: rgba(255,255,255,0.65);
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.85rem;
      margin-top: 0.6rem;
      max-width: 600px;
      margin-left: auto; margin-right: auto;
      line-height: 1.6;
    }




    .lightbox-counter {
      position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.12em;
    }

    @media (max-width: 768px) {
      .masonry { columns: 2; }
      .lightbox-nav { display: none; }
    }
    @media (max-width: 480px) {
      .masonry { columns: 1; }
    }


    /* ── FOOTER ── */
    footer {
      background: #0d0d0d; padding: 1.2rem 2.5rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.7rem; color: #3a3a3a;
      text-transform: uppercase; letter-spacing: 0.1em;
    }

    /* ── ANIMATIONS ── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    .reveal {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible { opacity: 1; transform: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { gap: 1.25rem; }
      #hero { grid-template-columns: 1fr; padding: 3rem 1.25rem; min-height: auto; }
      .hero-photo-wrap { display: none; }
      .container { padding: 0 1.25rem; }
      .section-wrap { padding: 3.5rem 0; }
      .photos-grid { grid-template-columns: 1fr 1fr; }
      .photo-card.featured { grid-column: span 2; grid-row: auto; }
      .photo-card.featured img { aspect-ratio: 16/9; height: auto; }
      .video-item { grid-template-columns: 140px 1fr; gap: 1rem; padding: 1rem; }
      .articles-grid { grid-template-columns: 1fr; }
      .article-card.featured-article { grid-column: span 1; grid-template-columns: 1fr; }
      .featured-article .article-title { font-size: 1.25rem; }
      .contact-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      footer { padding: 1rem 1.25rem; }
    }

  </style>
</head>

  <div class="container">
    <header class="page-header reveal">
      <p class="breadcrumb"><a href="index.html">Accueil</a><span>/</span>Photographies</p>
      <h1 class="page-title">Photographies</h1>
      <p class="page-subtitle">Reportages, portraits et instants saisis sur le terrain</p>
    </header>
  </div>

  <div class="container page-body">

    <div class="filters reveal">
      <button class="filter-btn active" data-filter="all">Tout</button>
      <button class="filter-btn" data-filter="politique">Politique</button>
      <button class="filter-btn" data-filter="societe">Société</button>
      <button class="filter-btn" data-filter="culture">Culture</button>
      <button class="filter-btn" data-filter="efj">EFJ</button>
    </div>

    <div class="masonry reveal" id="gallery"></div>


  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">✕</button>
    <div class="lightbox-counter" id="lb-counter"></div>
    <div class="lightbox-inner">
      <button class="lightbox-nav" id="lb-prev">‹</button>
      <img class="lightbox-img" id="lb-img" src="" alt="" />
      <button class="lightbox-nav" id="lb-next">›</button>
    </div>
    <div class="lightbox-info">
      <div class="lightbox-info-title" id="lb-title"></div>
      <div class="lightbox-info-meta" id="lb-meta"></div>
      <div class="lightbox-info-alt" id="lb-alt"></div>
    </div>
  </div>

  <footer>
    <span>© 2026 Alexandre Ligneul</span>
    <span>Portfolio</span>
  </footer>

  <script>
    // ── DONNÉES PHOTOS ──
    const photos = [
      { file: "IMG_0028.JPEG",  title: "Concert du GP Explorer Last Race",           meta: "Circuit des 24h du Mans · 4 octobre 2025",   category: "culture",   alt: "Ecran de la scène du GP Explorer Last Race organisé par Squeezie." },
      { file: "IMG_0043.JPEG",  title: "SDM au GP Explorer Last Race",               meta: "Circuit des 24h du Mans · 5 octobre 2025",   category: "culture",   alt: "Pendant la course, le rappeur SDM suit l'événement depuis sa loge." },
      { file: "IMG_0157.JPG",   title: "Discours d'ouverture du QG de Rachida Dati", meta: "Paris 12ème · 16 octobre 2025",              category: "politique", alt: "Rachida Dati prononce le discours d'ouverture du QG de campagne municipale de Paris 2026." },
      { file: "IMG_0159.JPG",   title: "Discours d'ouverture du QG de Rachida Dati", meta: "Paris 12ème · 16 octobre 2025",              category: "politique", alt: "Rachida Dati prononce le discours d'ouverture du QG de campagne municipale de Paris 2026." },
      { file: "IMG_0170.JPG",   title: "Ouverture du QG de campagne de Rachida Dati",meta: "Paris 12ème · 16 octobre 2025",              category: "politique", alt: "Ouverture du QG de campagne municipale de Paris 2026, de nombreux partisans y sont conviés." },
      { file: "IMG_0178.JPEG",  title: "Dernière de Lamomali Tour de M à Bercy",     meta: "Bercy, Paris · 17 décembre 2025",            category: "culture",   alt: "Le chanteur M clôture sa tournée à l'Accor Arena Bercy à Paris." },
      { file: "IMG_0436.JPEG",  title: "Porte Ouverte EFJ",                          meta: "Paris 15ème · 8 novembre 2025",             category: "efj",       alt: "Le stand EFJ au salon des écoles de journalisme et des métiers de l'information." },
      { file: "IMG_0546.JPG",   title: "Campagne de Dati : Tractage",                meta: "Paris 1er · 19 octobre 2025",               category: "politique", alt: "Les partisans de Rachida Dati tractent dans les arrondissements de Paris." },
      { file: "IMG_0610.JPEG",  title: "200 ans du Figaro : Concert de Patrick Bruel",meta: "Grand Palais, Paris · 15 janvier 2026",    category: "culture",   alt: "Patrick Bruel anime la scène du Grand Palais pour l'exposition des 200 ans du Figaro." },
      { file: "IMG_0631.JPEG",  title: "200 ans du Figaro",                          meta: "Grand Palais, Paris · 15 janvier 2026",     category: "culture",   alt: "Le Figaro a organisé une exposition au Grand Palais réservée à leurs abonnés." },
      { file: "IMG_0829.JPG",   title: "Campagne de Dati : Visite des bars LGBT+",   meta: "Paris · 28 octobre 2025",                   category: "politique", alt: "Rachida Dati et Aurélien Veron visitent les restaurateurs LGBTQIA+." },
      { file: "IMG_0865.JPG",   title: "Campagne de Dati : Visite des bars LGBT+",   meta: "Paris · 28 octobre 2025",                   category: "politique", alt: "Rachida Dati et Aurélien Veron visitent les restaurateurs LGBTQIA+." },
      { file: "IMG_0869.JPEG",  title: "Campagne de Dati : Commerçants du 12ème",    meta: "Paris 12ème · 29 novembre 2025",            category: "politique", alt: "Rachida Dati et Valérie Montandon visitent les commerçants du 12ème." },
      { file: "IMG_0901.JPG",   title: "Campagne de Dati : Camp de sans-abris",      meta: "Paris Centre · 28 octobre 2025",            category: "politique", alt: "Rachida Dati et Aurélien Veron visitent des sans-abris à Paris Centre." },
      { file: "IMG_0910.JPG",   title: "Campagne de Dati : Camp de sans-abris",      meta: "Paris Centre · 28 octobre 2025",            category: "politique", alt: "Rachida Dati et Aurélien Veron visitent des sans-abris à Paris Centre." },
      { file: "IMG_1036.JPEG",  title: "Reportage à Rungis : Embarquement de viande",meta: "Rungis · 9 décembre 2025",                  category: "societe",   alt: "Des bouchers chargent leur camion de viande lors d'un reportage sur la vie nocturne de Rungis." },
      { file: "IMG_1097.JPG",   title: "Halloween à Lille",                          meta: "Lille · 1 novembre 2025",                   category: "societe",   alt: "Les jeunes tournent en dérision le cambriolage des bijoux du Louvre lors d'Halloween à Lille." },
      { file: "IMG_1238.JPEG",  title: "Musée juif de Berlin",                       meta: "Berlin · 27 décembre 2025",                 category: "culture",   alt: "Installation Shalechet de Menashe Kadishman au musée juif de Berlin." },
      { file: "IMG_1266.JPEG",  title: "Plafond du Reichstag à Berlin",              meta: "Berlin · 27 décembre 2025",                 category: "culture",   alt: "Visite du Reichstag à Berlin, lieu du parlement berlinois." },
      { file: "IMG_1411.JPEG",  title: "Fort épisode neigeux à Paris",               meta: "Paris · 7 janvier 2026",                    category: "societe",   alt: "Grosse vague de neige à Paris, la capitale est au ralenti, presque aucune voiture dans les rues." },
      { file: "IMG_1427.JPEG",  title: "Fort épisode neigeux à Paris",               meta: "Paris · 7 janvier 2026",                    category: "societe",   alt: "Paris sous la neige, embouteillages historiques en périphérie." },
      { file: "IMG_1584.JPEG",  title: "Conférence Média En Seine",                  meta: "Paris · 15 janvier 2026",                   category: "efj",       alt: "Conférence sur les évolutions du métier de journaliste au Studio 104 de FranceInfo." },
      { file: "IMG_1691.JPEG",  title: "Procès en Appel de Marine Le Pen",           meta: "Paris · 20 janvier 2026",                   category: "politique", alt: "Le carré presse devant la salle d'audience du Palais de Justice." },
      { file: "IMG_5390.JPEG",  title: "Corrida : Taureau dans une arène",           meta: "Ondara · 9 août 2025",                      category: "culture",   alt: "Taureau blessé par les picadors lors d'une corrida en Espagne." },
      { file: "P1031928.JPG",   title: "Reportage à Rungis : Dock de chargement",    meta: "Rungis · 9 décembre 2025",                  category: "societe",   alt: "Les camions sur les docks pour acheter leurs fruits et légumes à Rungis." },
      { file: "P1031986.JPG",   title: "Studio EFJ",                                 meta: "Paris · 4 février 2026",                    category: "efj",       alt: "Console de réalisateur d'émission dans le studio EFJ à Raspail 1." },
      { file: "P1031987.JPG",   title: "Studio EFJ",                                 meta: "Paris · 4 février 2026",                    category: "efj",       alt: "Console de régisseur d'émission dans le studio EFJ à Raspail 1." },
      { file: "P1032031.JPG",   title: "Emmaüs Défi : collecte de mobilier",         meta: "Paris · 5 février 2026",                    category: "societe",   alt: "Des personnes en insertion professionnelle d'Emmaüs Défi collectent des meubles chez un donateur." }
    ];

    // ── GÉNÉRATION DE LA GALERIE ──
    const gallery = document.getElementById('gallery');
    photos.forEach(photo => {
      gallery.innerHTML += `
        <div class="masonry-item" data-category="${photo.category}" data-title="${photo.title}" data-meta="${photo.meta}" data-alt="${photo.alt}">
          <img src="assets/images/${photo.file}" alt="${photo.title}" />
          <div class="masonry-caption">
            <span class="masonry-caption-title">${photo.title}</span>
            <span class="masonry-caption-meta">${photo.meta}</span>
          </div>
        </div>`;
    });

    // ── FILTRES ──
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        document.querySelectorAll('.masonry-item').forEach(item => {
          item.style.display = (f === 'all' || item.dataset.category === f) ? '' : 'none';
        });
      });
    });

    // ── LIGHTBOX ──
    let current = 0;
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lb-img');
    const lbTitle = document.getElementById('lb-title');
    const lbMeta  = document.getElementById('lb-meta');
    const lbAlt   = document.getElementById('lb-alt');
    const lbCounter = document.getElementById('lb-counter');

    function getVisible() {
      return [...document.querySelectorAll('.masonry-item')].filter(i => i.style.display !== 'none');
    }
    function openLightbox(idx) {
      const vis = getVisible();
      current = idx;
      const item = vis[idx];
      const imgEl = item.querySelector('img');
      if (!imgEl) return;
      lbImg.src = imgEl.src;
      lbTitle.textContent   = item.dataset.title || '';
      lbMeta.textContent    = item.dataset.meta  || '';
      lbAlt.textContent     = item.dataset.alt   || '';
      lbCounter.textContent = `${idx + 1} / ${vis.length}`;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }
    function navigate(dir) {
      const vis = getVisible();
      current = (current + dir + vis.length) % vis.length;
      openLightbox(current);
    }

    document.querySelectorAll('.masonry-item').forEach(item => {
      item.addEventListener('click', () => {
        const vis = getVisible();
        openLightbox(vis.indexOf(item));
      });
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('lb-next').addEventListener('click', () => navigate(1));
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   navigate(-1);
      if (e.key === 'ArrowRight')  navigate(1);
    });

    // ── SCROLL REVEAL ──
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  </script>
</body>
</html>
